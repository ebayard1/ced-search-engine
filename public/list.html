<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pull Sheet</title>
<style>
  * { box-sizing: border-box; }
  :root { color-scheme: light; }
  body { font: 15px/1.4 -apple-system, "Segoe UI", Roboto, Arial, sans-serif; color: #182234; background: #fff; margin: 24px; }
  h1 { font-size: 20px; margin: 0 0 2px; }
  .sub { color: #64708a; font-size: 13px; margin-bottom: 14px; }
  .zone { margin: 18px 0 6px; font-size: 13px; font-weight: 700; letter-spacing: .08em;
          text-transform: uppercase; color: #14335F; border-bottom: 2px solid #14335F; padding-bottom: 2px; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid #cfd6e2; padding: 6px 10px; text-align: left; vertical-align: top; }
  th { background: #f4f6f9; font-size: 12px; color: #64708a; }
  td.bin, td.cat { font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace; white-space: nowrap; }
  td.qty { font-size: 18px; font-weight: 700; text-align: center; width: 70px; }
  td.chk { width: 46px; text-align: center; font-size: 18px; }
  .out { color: #C8102E; font-weight: 700; }
  .note { color: #64708a; font-size: 12px; }
  .toolbar { margin-bottom: 16px; }
  button { font: inherit; padding: 6px 14px; cursor: pointer; }
  @media print { .toolbar { display: none; } body { margin: 0; } }
</style>
</head>
<body>
<div class="toolbar"><button onclick="window.print()">🖨 Print</button> <a href="/">← back to search</a></div>
<div id="sheet">loading…</div>
<script>
'use strict';
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
(async function () {
  const id = new URLSearchParams(location.search).get('id');
  const el = document.getElementById('sheet');
  if (!id) { el.textContent = 'no list id'; return; }
  let data;
  try {
    const res = await fetch('/api/lists?id=' + encodeURIComponent(id));
    data = await res.json();
    if (!res.ok) throw new Error(data.error);
  } catch (e) { el.textContent = 'failed to load list: ' + e.message; return; }
  const list = data.list;
  document.title = 'Pull Sheet — ' + list.name;

  // group by first-bin zone, already in walk order from the server
  const groups = [];
  for (const it of list.items) {
    const z = it.firstZone || (it.totalQty > 0 ? '?' : 'NO STOCK');
    if (!groups.length || groups[groups.length - 1].zone !== z) groups.push({ zone: z, items: [] });
    groups[groups.length - 1].items.push(it);
  }
  el.innerHTML = `
    <h1>${esc(list.name)}</h1>
    <div class="sub">${list.items.length} line item${list.items.length === 1 ? '' : 's'} · printed ${new Date().toLocaleString()}</div>
    ${groups.map((g) => `
      <div class="zone">Zone ${esc(g.zone)}</div>
      <table>
        <thead><tr><th>bin</th><th>pull</th><th>catalog #</th><th>description</th><th>note</th><th>✓</th></tr></thead>
        <tbody>${g.items.map((it) => `
          <tr>
            <td class="bin">${esc(it.firstBin || '—')}${it.bins.length > 1 ? `<div class="note">also: ${it.bins.slice(1, 4).map((b) => esc(b.bin)).join(', ')}</div>` : ''}</td>
            <td class="qty">${esc(it.qty)}</td>
            <td class="cat">${esc(it.cat)} <span class="note">${esc(it.mfr)}</span></td>
            <td>${esc(it.desc)}${it.totalQty === 0 ? ' <span class="out">— no stock on file</span>' : ''}</td>
            <td class="note">${esc(it.note || '')}</td>
            <td class="chk">☐</td>
          </tr>`).join('')}
        </tbody>
      </table>`).join('')}
  `;
})();
</script>
</body>
</html>
